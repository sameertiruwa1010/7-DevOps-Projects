apiVersion: v1
kind: Namespace
metadata:
  name: taskboard
  labels:
    app: taskboard
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: taskboard-config
  namespace: taskboard
data:
  NODE_ENV: "production"
  PORT: "5000"
  LOG_LEVEL: "info"
  FRONTEND_URL: "http://frontend-service.taskboard.svc.cluster.local"
