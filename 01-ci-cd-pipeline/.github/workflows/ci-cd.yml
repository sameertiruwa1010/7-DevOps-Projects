name: CI/CD Pipeline

# Run when code is pushed
on:
  push:
    branches: [main]

jobs:

# ─────────────────────────
# Backend Tests
# ─────────────────────────
  test-backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 01-ci-cd-pipeline/backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --passWithNoTests


# ─────────────────────────
# Frontend Tests
# ─────────────────────────
  test-frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 01-ci-cd-pipeline/frontend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests


# ─────────────────────────
# Build & Push Docker Images
# ─────────────────────────
  build-push:
    needs: [test-backend, test-frontend]

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      # Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Setup Docker builder
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3


      # ─── Backend Image ───
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: 01-ci-cd-pipeline/backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-backend:latest


      # ─── Frontend Image ───
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: 01-ci-cd-pipeline/frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devops-frontend:latest
